const TOKEN_KEY = "gh-roadmap-token";

function getToken(){return localStorage.getItem(TOKEN_KEY)||"";}
function setToken(t){localStorage.setItem(TOKEN_KEY,t);}

async function ghRead(token){
  const res=await fetch(GH_API,{headers:{"Authorization":`token ${token}`,"Accept":"application/vnd.github.v3+json"}});
  if(res.status===404)return{data:null,sha:null};
  if(!res.ok)throw new Error("GitHub read failed: "+res.status);
  const json=await res.json();
  const decoded=JSON.parse(atob(json.content.replace(/\n/g,"")));
  return{data:decoded,sha:json.sha};
}

async function ghWrite(token,data,sha){
  const body={message:"Update roadmap data",content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))))};
  if(sha)body.sha=sha;
  const res=await fetch(GH_API,{method:"PUT",headers:{"Authorization":`token ${token}`,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.text();throw new Error("GitHub write failed: "+res.status+" "+e);}
  const json=await res.json();
  return json.content.sha;
}

// ── Token Setup Screen ──
function TokenSetup({onToken}){
  const [val,setVal]=useState("");
  const [err,setErr]=useState("");

    if(!val.trim())return;

    try{
      const res=await fetch(`https://api.github.com/repos/${GH_REPO}`,{headers:{"Authorization":`token ${val.trim()}`}});
      if(!res.ok)throw new Error("Invalid token or no access to repo");
      setToken(val.trim());onToken(val.trim());
    }catch(e){setErr(e.message);}
    setTesting(false);
  };
  return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f5f4f1"}}>
    <div style={{background:"#fff",borderRadius:12,padding:32,width:440,maxWidth:"90vw",boxShadow:"0 8px 32px rgba(0,0,0,0.1)"}}>

      <div style={{fontSize:12,color:"#666",marginBottom:20}}>Enter your GitHub personal access token to enable cloud sync. Your token is stored only in this browser and is used to read/write data to your repository.</div>
      <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.03em",marginBottom:4}}>GitHub Personal Access Token</div>
      <input type="password" value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()} placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style={{width:"100%",padding:"10px 14px",borderRadius:6,border:"1.5px solid #ccc",fontSize:14,fontFamily:"monospace",outline:"none",boxSizing:"border-box",marginBottom:12}}/>
      {err&&<div style={{color:"#c62828",fontSize:12,marginBottom:10,padding:"6px 10px",background:"#fef2f2",borderRadius:4}}>{err}</div>}
      <button onClick={handleSubmit} disabled={testing} style={{width:"100%",padding:"10px",borderRadius:6,border:"none",background:"#1a3a5c",color:"#fff",fontSize:14,fontWeight:600,cursor:testing?"wait":"pointer"}}>{testing?"Verifying...":"Connect & Launch"}</button>

    </div>

}

function App(){
  const [token,setTokenState]=useState(getToken());
  if(!token)return <TokenSetup onToken={setTokenState}/>;
  return <RoadmapApp token={token} onLogout={()=>{localStorage.removeItem(TOKEN_KEY);setTokenState("");}}/>;
}

  const openAdd=()=>{setEdit(null);setFName("");setFGroup(allGroups[0]||"");setFNewGroup("");setFUseNew(false);setFSM("");setFSY("");setFEM("");setFEY("");setFDetails("");setFCost("");setModal(true);};
  const openEdit=(it)=>{setEdit(it);setFName(it.name);setFGroup(it.group);setFNewGroup("");setFUseNew(false);setFSM(it.sm||"");setFSY(it.sy?String(it.sy):"");setFEM(it.em||"");setFEY(it.ey?String(it.ey):"");setFDetails(it.details||"");setFCost(it.cost!=null?String(it.cost):"");setModal(true);};
  const doSave=()=>{const nm=fName.trim(),gr=fUseNew?fNewGroup.trim():fGroup;if(!nm||!gr)return;const hasDates=fSM&&fSY;const costVal=fCost.trim()?parseFloat(fCost.trim()):null;const obj={name:nm,group:gr,details:fDetails.trim(),sm:hasDates?fSM:null,sy:hasDates?parseInt(fSY):null,em:hasDates?(fEM||fSM):null,ey:hasDates?parseInt(fEY||fSY):null,cost:costVal!=null&&!isNaN(costVal)?costVal:null};if(edit)updateItems(p=>p.map(i=>i.id===edit.id?{...i,...obj}:i));else{const nn=nid+1;updateItemsAndNid(p=>[...p,{id:nid,...obj}],nn);}setModal(false);};
  const doDelete=id=>setConfirmDel(id);
  const confirmDeleteYes=()=>{updateItems(p=>p.filter(i=>i.id!==confirmDel));setConfirmDel(null);setHover(null);setTip(null);};

  const handleMouseMove=(e,it)=>{if(!drag){setTip(it);setTipPos({x:e.clientX,y:e.clientY});}};
  const handleMouseLeave=()=>{if(!drag){setTip(null);setHover(null);}};

  const openImport=()=>{setImportText("");setImportErr("");setImportPreview(null);setImportPanel(true);};
  const handleImportTextChange=(text)=>{setImportText(text);setImportErr("");setImportPreview(null);if(text.trim()){const parsed=csvToItems(text);if(parsed)setImportPreview(parsed);else setImportErr("Could not parse CSV. Ensure it has at least Name and Group columns.");}};
  const handleFileUpload=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{handleImportTextChange(ev.target.result);};reader.readAsText(file);e.target.value="";};
  const handleImportConfirm=()=>{if(!importPreview)return;const nn=nid+importPreview.length;const newItems=importPreview.map((it,i)=>({...it,id:nid+i}));updateItemsAndNid(()=>newItems,nn);setImportPanel(false);};

  const inp={width:"100%",padding:"9px 12px",borderRadius:6,border:"1.5px solid #ccc",fontSize:14,fontFamily:"system-ui,sans-serif",outline:"none",boxSizing:"border-box"};
  const ActionBtns=({it})=>(<span style={{display:"flex",gap:3,flexShrink:0,marginLeft:4,zIndex:3}}><button onClick={(e)=>{e.stopPropagation();openEdit(it);}} style={{background:"rgba(255,255,255,0.3)",border:"none",color:"#fff",borderRadius:3,width:20,height:20,cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>&#9998;</button><button onClick={(e)=>{e.stopPropagation();doDelete(it.id);}} style={{background:"rgba(255,255,255,0.3)",border:"none",color:"#fff",borderRadius:3,width:20,height:20,cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>&#10005;</button></span>);

  const curYear=new Date().getFullYear();const yearOpts=[];for(let y=curYear-1;y<=curYear+5;y++)yearOpts.push(y);
  let dragLabel=null;if(drag&&dragPreview){const s=fromA(dragPreview.sa),e=fromA(dragPreview.ea);dragLabel=s.month+" "+s.year+(dragPreview.sa!==dragPreview.ea?" – "+e.month+" "+e.year:"");}

  if(!loaded)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f5f4f1"}}><div style={{fontSize:16,color:"#666"}}>Loading roadmap from GitHub...</div></div>;

  return (
    <div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:"#f5f4f1",minHeight:"100vh",overflow:"auto",userSelect:drag?"none":"auto"}}>
      <div style={{background:"linear-gradient(135deg,#0d1f3c,#1a3a5c 70%,#234b73)",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:7,background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="22" height="15" viewBox="0 0 32 22"><path d="M13 2C9 2 6 5.5 6 9c0 .5.1 1 .2 1.5C3 11.5 1 14 1 17c0 3 2.5 5 5.5 5h19c3 0 5.5-2 5.5-5 0-2.5-1.5-4.5-3.8-5.2.1-.6.3-1.2.3-1.8 0-4-3-7-7-7-1.5 0-2.8.4-4 1.2C15 2.8 14 2 13 2z" fill="#e8530e"/></svg>
          </div>
          <div>
            <div style={{fontSize:18,fontWeight:800,color:"#fff"}}>Salesforce Service Roadmap</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",fontWeight:500}}>UF Lastinger Center for Learning</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {/* Sync status */}
          <div className={`sync-indicator ${syncStatus==="saved"?"sync-saved":syncStatus==="saving"?"sync-saving":"sync-error"}`}>
            {syncStatus==="saved"?"● Synced":syncStatus==="saving"?"● Saving...":"● Sync error"}
          </div>
          <div style={{background:"rgba(74,222,128,0.12)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:6,padding:"4px 12px",display:"flex",flexDirection:"column",alignItems:"flex-end"}}>
            <div style={{fontSize:8,fontWeight:600,color:"rgba(74,222,128,0.7)",textTransform:"uppercase",letterSpacing:"0.05em"}}>Total Est. Cost</div>
            <div style={{fontSize:15,fontWeight:800,color:"#4ade80",lineHeight:1.1}}>{fmtM(totalCost)||"$0"}</div>
          </div>
          <span style={{background:"rgba(232,83,14,0.15)",color:"#e8530e",padding:"4px 10px",borderRadius:4,fontSize:10,fontWeight:700,letterSpacing:"0.08em",border:"1px solid rgba(232,83,14,0.3)"}}>DRAFT</span>
          <button onClick={openImport} style={{background:"rgba(255,255,255,0.1)",color:"#fff",border:"1px solid rgba(255,255,255,0.2)",borderRadius:6,padding:"7px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Import CSV</button>
          <button onClick={()=>downloadCSV(items)} style={{background:"#fff",color:"#1a3a5c",border:"none",borderRadius:6,padding:"7px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Export CSV</button>
          <button onClick={openAdd} style={{background:"#e8530e",color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Add</button>
          <button onClick={onLogout} style={{background:"transparent",color:"rgba(255,255,255,0.4)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,padding:"7px 10px",fontSize:10,fontWeight:500,cursor:"pointer"}} title="Disconnect token">Logout</button>
        </div>
      </div>

      <div style={{padding:"14px 18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"baseline",gap:10}}>
            <div style={{fontSize:12,fontWeight:700,color:"#e8530e",letterSpacing:"0.05em",textTransform:"uppercase"}}>Proposed Timeline</div>
            <div style={{fontSize:10,color:"#aaa",fontStyle:"italic"}}>Drag to move · edges to resize</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4,background:"#fff",borderRadius:6,padding:"3px 6px",border:"1px solid #e0ded9"}}>
            <span style={{fontSize:9,fontWeight:600,color:"#666",textTransform:"uppercase"}}>Zoom</span>
            {ZL.map(z=>(<button key={z} onClick={()=>setZoom(z)} style={{padding:"3px 7px",borderRadius:4,border:"none",fontSize:10,fontWeight:zoom===z?700:500,background:zoom===z?"#1a3a5c":"transparent",color:zoom===z?"#fff":"#666",cursor:"pointer"}}>{z}%</button>))}
            <span style={{fontSize:8,color:"#aaa"}}>{ZLA[zoom]}</span>
          </div>
        </div>

        <div style={{background:"#fff",borderRadius:8,overflow:"auto",boxShadow:"0 1px 6px rgba(0,0,0,0.05)",border:"1px solid #e5e3de",marginBottom:20}}>
          <div style={{minWidth:totalMonths*colW}}>
            <div style={{display:"flex",background:"#0d1f3c"}}>{headerCols.map((h,i)=>(<div key={i} style={{flex:h.span,padding:"5px 0",textAlign:"center",fontSize:12,fontWeight:800,color:"#fff",letterSpacing:"0.06em",borderRight:"1px solid rgba(255,255,255,0.12)"}}>{h.label}</div>))}</div>
            {subCols&&(<div ref={timelineRef} style={{display:"flex",background:"#1a3a5c"}}>{subCols.map((c,i)=>(<div key={i} style={{flex:c.span,padding:"5px 0",textAlign:"center",fontSize:zoom<=75?11:10,fontWeight:700,color:"#fff",letterSpacing:"0.04em",borderRight:"1px solid rgba(255,255,255,0.08)"}}>{c.label}</div>))}</div>)}
            {!subCols&&<div ref={timelineRef} style={{display:"flex"}}>{headerCols.map((h,i)=><div key={i} style={{flex:h.span}}/>)}</div>}
            {Object.entries(tGroups).map(([gn,gi])=>(
              <div key={gn} style={{borderBottom:"1px solid #eee",padding:"8px 0"}}>
                <div style={{fontSize:9,fontWeight:700,color:gc(gn),textTransform:"uppercase",letterSpacing:"0.04em",padding:"0 12px 4px"}}>{gn}</div>
                <div style={{position:"relative"}}>
                  <div style={{position:"absolute",inset:0,display:"flex",pointerEvents:"none"}}>{monthCols.map((c,i)=><div key={i} style={{flex:1,borderRight:"1px solid #f2f0ed"}}/>)}</div>
                  <div style={{position:"relative",padding:"0 2px"}}>
                    {gi.map(it=>{const bs=getBarPos(it);const isDr=drag&&drag.id===it.id;const cs=fmtM(it.cost);return(
                      <div key={it.id} style={{position:"relative",...bs,marginBottom:2,minWidth:30,zIndex:isDr?10:1}} onMouseEnter={()=>{if(!drag)setHover(it.id);}} onMouseMove={(e)=>handleMouseMove(e,it)} onMouseLeave={handleMouseLeave}>
                        <div style={{background:gc(it.group),color:"#fff",borderRadius:3,fontSize:10,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"flex",alignItems:"center",justifyContent:"space-between",gap:4,minHeight:26,position:"relative",opacity:isDr?0.85:1,boxShadow:isDr?"0 4px 16px rgba(0,0,0,0.3)":"none"}}>
                          <div onMouseDown={(e)=>onDragStart(e,it,"resizeL")} style={{position:"absolute",left:0,top:0,bottom:0,width:7,cursor:"ew-resize",zIndex:2,background:hover===it.id&&!drag?"rgba(255,255,255,0.15)":"transparent"}}/>
                          <div onMouseDown={(e)=>onDragStart(e,it,"move")} style={{flex:1,padding:"4px 10px",cursor:drag?"grabbing":"grab",overflow:"hidden",textOverflow:"ellipsis",display:"flex",alignItems:"center",gap:6}}>
                            <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{isDr&&dragLabel?dragLabel:it.name}</span>
                            {cs&&!isDr&&zoom>=100&&<span style={{fontSize:9,opacity:0.7,flexShrink:0}}>{cs}</span>}
                          </div>
                          <div onMouseDown={(e)=>onDragStart(e,it,"resizeR")} style={{position:"absolute",right:0,top:0,bottom:0,width:7,cursor:"ew-resize",zIndex:2,background:hover===it.id&&!drag?"rgba(255,255,255,0.15)":"transparent"}}/>
                          {hover===it.id&&!drag&&<ActionBtns it={it}/>}
                        </div>
                      </div>);})}
                  </div>
                </div>
              </div>
            ))}
            {Object.keys(tGroups).length===0&&<div style={{padding:28,textAlign:"center",color:"#999",fontSize:12}}>No timeline items yet.</div>}
          </div>
        </div>

        {Object.keys(fGroups).length>0&&(<div>
          <div style={{borderTop:"2px dashed #ccc",paddingTop:14,marginBottom:10,display:"flex",alignItems:"baseline",gap:10}}>
            <div style={{fontSize:12,fontWeight:700,color:"#e8530e",letterSpacing:"0.05em",textTransform:"uppercase"}}>Future — Needs Planning</div>
            <span style={{fontSize:10,color:"#999",fontStyle:"italic"}}>Dates TBD</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {Object.entries(fGroups).map(([gn,gi])=>(<div key={gn} style={{background:"#fff",borderRadius:7,padding:10,boxShadow:"0 1px 4px rgba(0,0,0,0.04)",border:"1px solid #e5e3de"}}>
              <div style={{fontSize:9,fontWeight:700,color:gc(gn),textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:5}}>{gn}</div>
              {gi.map(it=>(<div key={it.id} style={{background:gc(it.group),color:"#fff",padding:"5px 9px",borderRadius:3,fontSize:10,fontWeight:500,marginBottom:3,display:"flex",alignItems:"center",justifyContent:"space-between",gap:4,cursor:"default"}} onMouseEnter={()=>setHover(it.id)} onMouseMove={(e)=>handleMouseMove(e,it)} onMouseLeave={handleMouseLeave}>
                <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.name}</span>
                {hover===it.id&&<ActionBtns it={it}/>}
              </div>))}
            </div>))}
          </div>
        </div>)}
      </div>

      {tip&&!drag&&<Tooltip item={tip} x={tipPos.x} y={tipPos.y}/>}

      {importPanel&&(<div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.45)"}} onClick={()=>setImportPanel(false)}><div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:10,padding:24,width:620,maxWidth:"92vw",maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>
        <div style={{fontSize:18,fontWeight:700,color:"#1a3a5c",marginBottom:4}}>Import CSV</div>
        <div style={{fontSize:12,color:"#666",marginBottom:12}}>Upload a .csv file or paste CSV data.</div>
        <div style={{display:"flex",gap:10,marginBottom:12,alignItems:"center"}}><input ref={fileRef} type="file" accept=".csv,.txt" onChange={handleFileUpload} style={{display:"none"}}/><button onClick={()=>fileRef.current&&fileRef.current.click()} style={{padding:"8px 16px",borderRadius:6,border:"1.5px dashed #1a3a5c",background:"#f5f4f1",cursor:"pointer",fontSize:12,fontWeight:600,color:"#1a3a5c"}}>Choose .csv file</button><span style={{fontSize:11,color:"#999"}}>or paste below</span></div>
        <textarea value={importText} onChange={e=>handleImportTextChange(e.target.value)} placeholder="Name,Group,Start Month,Start Year,..." style={{width:"100%",height:160,fontFamily:"monospace",fontSize:11,padding:12,borderRadius:6,border:"1.5px solid #ccc",boxSizing:"border-box",resize:"vertical",background:"#fafaf8",outline:"none"}}/>
        {importErr&&<div style={{color:"#c62828",fontSize:12,fontWeight:600,marginTop:8,padding:"8px 12px",background:"#fef2f2",borderRadius:6}}>{importErr}</div>}
        {importPreview&&(<div style={{marginTop:10,padding:12,background:"#f0fdf4",borderRadius:6,border:"1px solid #bbf7d0"}}><div style={{fontSize:12,fontWeight:700,color:"#166534",marginBottom:6}}>Preview: {importPreview.length} items</div><div style={{maxHeight:120,overflow:"auto",fontSize:11,color:"#333"}}>{importPreview.slice(0,8).map((it,i)=>(<div key={i} style={{padding:"3px 0",borderBottom:"1px solid #dcfce7",display:"flex",gap:8}}><span style={{fontWeight:600,minWidth:160}}>{it.name}</span><span style={{color:"#666"}}>{it.group}</span><span style={{color:"#999"}}>{it.sm?it.sm+" "+it.sy:"TBD"}</span>{it.cost!=null&&<span style={{color:"#166534"}}>{fmtM(it.cost)}</span>}</div>))}{importPreview.length>8&&<div style={{color:"#999",fontStyle:"italic"}}>...and {importPreview.length-8} more</div>}</div></div>)}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}><button onClick={()=>setImportPanel(false)} style={{padding:"8px 18px",borderRadius:6,border:"1.5px solid #ccc",background:"#fff",cursor:"pointer",fontSize:13,fontWeight:500,color:"#555"}}>Cancel</button><button onClick={handleImportConfirm} disabled={!importPreview} style={{padding:"8px 18px",borderRadius:6,border:"none",background:importPreview?"#166534":"#ccc",color:"#fff",cursor:importPreview?"pointer":"not-allowed",fontSize:13,fontWeight:600}}>Import {importPreview?importPreview.length:0} Items</button></div>
      </div></div>)}

      {modal&&(<div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.45)"}} onClick={()=>setModal(false)}><div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:10,padding:24,width:460,maxWidth:"92vw",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>
        <div style={{fontSize:18,fontWeight:700,color:"#1a3a5c",marginBottom:18}}>{edit?"Edit Item":"Add Roadmap Item"}</div>
        <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",marginBottom:3}}>Item Name</div><input style={inp} value={fName} onChange={e=>setFName(e.target.value)} placeholder="e.g. Service Cloud Launch"/></div>
        <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",marginBottom:3}}>Group</div>{!fUseNew?(<div style={{display:"flex",gap:6}}><select style={{...inp,flex:1}} value={fGroup} onChange={e=>setFGroup(e.target.value)}>{allGroups.map(g=><option key={g} value={g}>{g}</option>)}</select><button onClick={()=>setFUseNew(true)} style={{padding:"8px 12px",borderRadius:6,border:"1.5px dashed #e8530e",background:"transparent",color:"#e8530e",cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>+ New</button></div>):(<div style={{display:"flex",gap:6}}><input style={{...inp,flex:1}} value={fNewGroup} onChange={e=>setFNewGroup(e.target.value)} placeholder="New group name" autoFocus/><button onClick={()=>setFUseNew(false)} style={{padding:"8px 12px",borderRadius:6,border:"1.5px solid #ccc",background:"transparent",color:"#666",cursor:"pointer",fontSize:11}}>Back</button></div>)}</div>
        <div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",marginBottom:3}}>Estimated Cost ($)</div><input style={inp} type="number" value={fCost} onChange={e=>setFCost(e.target.value)} placeholder="e.g. 50000"/></div>
        <div style={{background:"#f9f8f6",borderRadius:8,padding:14,marginBottom:12,border:"1px solid #e5e3de"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",marginBottom:8}}>Start Date</div>
          <div style={{display:"flex",gap:8}}><div style={{flex:1}}><select style={inp} value={fSM} onChange={e=>setFSM(e.target.value)}><option value="">Month...</option>{MN.map(m=><option key={m} value={m}>{m}</option>)}</select></div><div style={{flex:1}}><select style={inp} value={fSY} onChange={e=>{setFSY(e.target.value);if(!fEY)setFEY(e.target.value);}}><option value="">Year...</option>{yearOpts.map(y=><option key={y} value={String(y)}>{y}</option>)}</select></div></div>
          <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",marginBottom:8,marginTop:12}}>End Date</div>
          <div style={{display:"flex",gap:8}}><div style={{flex:1}}><select style={inp} value={fEM} onChange={e=>setFEM(e.target.value)}><option value="">Same as start</option>{MN.map(m=><option key={m} value={m}>{m}</option>)}</select></div><div style={{flex:1}}><select style={inp} value={fEY} onChange={e=>setFEY(e.target.value)}><option value="">Same as start</option>{yearOpts.map(y=><option key={y} value={String(y)}>{y}</option>)}</select></div></div>
          <div style={{fontSize:10,color:"#999",marginTop:8}}>Leave empty for "Needs Planning" section.</div>
        </div>
        <div style={{marginBottom:16}}><div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",marginBottom:3}}>Details / Notes</div><textarea style={{...inp,minHeight:60,resize:"vertical"}} value={fDetails} onChange={e=>setFDetails(e.target.value)} placeholder="Optional notes..."/></div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>setModal(false)} style={{padding:"8px 18px",borderRadius:6,border:"1.5px solid #ccc",background:"#fff",cursor:"pointer",fontSize:13,fontWeight:500,color:"#555"}}>Cancel</button><button onClick={doSave} style={{padding:"8px 18px",borderRadius:6,border:"none",background:"#e8530e",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Save</button></div>
      </div></div>)}

      {confirmDel!==null&&(<div style={{position:"fixed",inset:0,zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.5)"}} onClick={()=>setConfirmDel(null)}><div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:10,padding:24,width:340,boxShadow:"0 20px 60px rgba(0,0,0,0.3)",textAlign:"center"}}>
        <div style={{fontSize:16,fontWeight:700,color:"#1a3a5c",marginBottom:6}}>Delete Item?</div>
        <div style={{fontSize:13,color:"#666",marginBottom:20}}>This cannot be undone.</div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}><button onClick={()=>setConfirmDel(null)} style={{padding:"8px 20px",borderRadius:6,border:"1.5px solid #ccc",background:"#fff",cursor:"pointer",fontSize:13,fontWeight:500,color:"#555"}}>Cancel</button><button onClick={confirmDeleteYes} style={{padding:"8px 20px",borderRadius:6,border:"none",background:"#c62828",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Delete</button></div>
      </div></div>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
